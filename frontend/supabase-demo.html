<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Issue - Supabase Realtime Demo</title>
    <!-- Use Inter font to match modern design principles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 2rem; 
            background: #f4f7f6; 
            color: #333;
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        .card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; color: #2c3e50; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #444; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #dcdde1; 
            border-radius: 6px; 
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        
        button { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        
        /* Message Toasts */
        #submitMessage { margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        
        /* Notifications */
        .notification-list { list-style: none; padding: 0; margin: 0; }
        .notification-item { 
            padding: 15px; 
            border-bottom: 1px solid #ecf0f1; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.9rem;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .notification-item.unread { font-weight: 600; background: #ebf5fb; border-left: 4px solid #3498db; }
        .notification-item.read { color: #7f8c8d; }
        .mark-read-btn { background: #2ecc71; font-size: 0.8rem; padding: 6px 10px; }
        .mark-read-btn:hover { background: #27ae60; }
        
        /* Bell Icon */
        #bell { font-size: 24px; position: relative; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #badge { 
            position: absolute; 
            top: -4px; right: -8px; 
            background: #e74c3c; 
            color: white; 
            border-radius: 50%; 
            padding: 2px 6px; 
            font-size: 11px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #2c3e50; margin-bottom: 40px;">CivicIssue Dashboard Demo</h1>
    
    <div class="container">
        <!-- 7. UI Example - Form to Submit -->
        <div class="card">
            <h2>Submit Complaint</h2>
            <div class="form-group">
                <label>Assumed User ID</label>
                <input type="number" id="userId" value="1" title="In a real app, this comes from Auth token state">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="Pothole on Main St.">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" placeholder="Report the details of the incident..."></textarea>
            </div>
            <button id="submitBtn">Submit Securely</button>
            <div id="submitMessage"></div>
        </div>

        <!-- 7. UI Example - Bell and Dashboard -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Live Notifications</h2>
                <!-- 7. Notification Bell -->
                <div id="bell">
                    🔔<span id="badge" style="display: none;">0</span>
                </div>
            </div>
            <button id="loadNotificationsBtn" style="margin-bottom: 20px; width: 100%;">Initialize & Load My Notifications</button>
            <ul id="notificationList" class="notification-list">
                <li style="color: #95a5a6; font-size: 0.9rem;">Click the button above to fetch data for the User ID on the left.</li>
            </ul>
        </div>
    </div>

    <!-- Ensure type="module" to enable import statements in standard JS! -->
    <script type="module" src="supabase-demo.js"></script>
</body>
</html>
