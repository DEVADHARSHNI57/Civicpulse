# =============================================
# Civic Issue Reporting — Application Config
# =============================================

# ----- PostgreSQL Database Connection -----
# Update these values to match your PostgreSQL setup
spring.datasource.url=jdbc:postgresql://localhost:5432/civic_db
spring.datasource.username=postgres
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- Connection Pool (HikariCP - default in Spring Boot) -----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ----- JPA / Hibernate Settings -----
# "update" auto-creates/updates tables from entity classes
# Switch to "validate" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect — tells Hibernate to generate PostgreSQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevents "relation does not exist" errors by quoting table/column names
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ----- JWT Configuration -----
# Secret key for signing JWT tokens — change this in production!
jwt.secret=REDACTED_JWT_SECRET
# Token validity: 86400000 ms = 24 hours
jwt.expiration=86400000

# ----- App Server -----
server.port=8081

# ----- Logging -----
logging.level.org.springframework.security=DEBUG
logging.level.com.civic=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.main.allow-circular-references=true
