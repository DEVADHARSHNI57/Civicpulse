# =============================================
# Civic Issue Reporting — Application Config
# =============================================

# ----- PostgreSQL Database Connection -----
# Local Postgres setup
spring.datasource.url=jdbc:postgresql://localhost:5432/civic_db
spring.datasource.username=postgres
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- Supabase Connection Example -----
# To connect Spring Boot directly to Supabase, swap out the above datasource settings with:
# spring.datasource.url=jdbc:postgresql://aws-0-REGION.pooler.supabase.com:6543/postgres?prepareThreshold=0
# spring.datasource.username=postgres.YOUR_PROJECT_ID
# spring.datasource.password=YOUR_DATABASE_PASSWORD
# spring.datasource.driver-class-name=org.postgresql.Driver
# NOTE: The database password is NOT the service role key. The backend handles DB interactions via standard JPA using this URL.
#
# Optional Supabase API keys for Realtime / Auth (Should not be exposed to Frontend/Clients!)
# supabase.url=https://YOUR_PROJECT_ID.supabase.co
# supabase.anon.key=YOUR_ANON_KEY

# ----- Connection Pool (HikariCP - default in Spring Boot) -----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ----- JPA / Hibernate Settings -----
# "update" auto-creates/updates tables from entity classes
# Switch to "validate" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect — tells Hibernate to generate PostgreSQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevents "relation does not exist" errors by quoting table/column names
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ----- JWT Configuration -----
# Secret key for signing JWT tokens — change this in production!
jwt.secret=REDACTED_JWT_SECRET
# Token validity: 86400000 ms = 24 hours
jwt.expiration=86400000

# ----- App Server -----
# Make the port overridable via env var and default to 8081 so local 8080 conflicts
# don't break startup (you can still force 8080 with SERVER_PORT=8080).
server.port=${SERVER_PORT:8081}

# ----- Logging -----
logging.level.org.springframework.security=DEBUG
logging.level.com.civic=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.main.allow-circular-references=true
