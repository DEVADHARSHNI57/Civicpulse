# =============================================
# Civic Issue Reporting - Application Config
# =============================================

# Load local .env files if present (never commit real .env values)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ----- PostgreSQL Database Connection -----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/civic_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- Connection Pool (HikariCP - default in Spring Boot) -----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ----- JPA / Hibernate Settings -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ----- JWT Configuration -----
jwt.secret=${JWT_SECRET:change_this_to_a_very_long_random_secret_key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ----- App Server -----
server.port=${PORT:${SERVER_PORT:8081}}

# ----- Logging -----
logging.level.org.springframework.security=DEBUG
logging.level.com.civic=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.main.allow-circular-references=true
